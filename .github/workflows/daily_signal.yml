name: 매일 투자 신호 알람

on:
  workflow_dispatch:  # cron-job.org가 정확한 시간에 외부에서 실행 (08:10 KST)

jobs:
  send-signal:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설치
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: |
          pip install finance-datareader ta requests pandas

      - name: 투자 신호 분석 & 텔레그램 전송
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python signal_cloud.py
